[project]
name = "philip"
version = "0.1.0"
description = "Bub main entrypoint project — startup, sandbox, and plugin assembly"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "bub-im-bridge @ git+https://github.com/iodone/bub-im-bridge.git",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true
