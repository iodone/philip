[project]
name = "philip"
version = "0.2.0"
description = "Bub main entrypoint project — startup, sandbox, and plugin assembly"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "bub == 0.3.6",
    "bub-im-bridge @ git+https://github.com/iodone/bub-im-bridge.git@v0.4.4",
    "bub-web-search @ git+https://github.com/bubbuild/bub-contrib.git@main#subdirectory=packages/bub-web-search",
    "bub-schedule @ git+https://github.com/bubbuild/bub-contrib.git@main#subdirectory=packages/bub-schedule",
]

[dependency-groups]
dev = [
    "black>=24.0",
    "mypy>=1.10",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv]
default-groups = []

[tool.ruff]
target-version = "py312"
src = ["philip"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.black]
line-length = 88
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
